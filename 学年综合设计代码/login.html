<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全网关 - DEFCON-X 防御中枢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { 
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: #e2e8f0; 
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        
        .scanline {
            width: 100%; height: 100vh; z-index: 0; position: absolute; pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(56, 189, 248, 0.08) 50%, rgba(255,255,255,0));
            background-size: 100% 8px;
            animation: pan-overlay 15s infinite linear;
        }
        @keyframes pan-overlay { from { background-position: 0 0; } to { background-position: 0 -100vh; } }

        .cyber-grid {
            position: absolute; inset: 0; z-index: 0;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: pulse-grid 4s infinite alternate ease-in-out;
        }
        @keyframes pulse-grid { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }

        .cyber-card { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 20px rgba(2, 132, 199, 0.2);
            position: relative;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
        }
        .cyber-card:hover {
            transform: translateY(-4px) scale(1.005);
            box-shadow: 0 15px 40px rgba(2, 132, 199, 0.5);
            border-color: rgba(56, 189, 248, 0.6);
        }

        .neon-text { text-shadow: 0 0 12px rgba(56, 189, 248, 0.8); }
        
        .input-box {
            background-color: #1e293b; 
            border: 1px solid #475569; 
            border-left: 3px solid #475569; 
            border-radius: 0.25rem; 
            padding: 0.6rem 0.75rem; 
            color: white; 
            outline: none; 
            transition: all 0.3s ease;
        }
        .input-box:focus {
            border-color: #3b82f6;
            border-left: 4px solid #38bdf8; 
            background-color: #0f172a;
            box-shadow: 4px 4px 15px rgba(59, 130, 246, 0.2) inset, 0 0 15px rgba(59, 130, 246, 0.4);
            transform: translateX(4px); 
        }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <div id="app" class="w-full max-w-lg p-6">
        <div class="cyber-card rounded-md p-10 group">
            
            <div class="text-center mb-8 relative">
                <div class="w-16 h-16 mx-auto bg-sky-900/30 rounded border border-sky-500/50 shadow-[0_0_15px_rgba(56,189,248,0.4)] mb-5 flex items-center justify-center transition-all duration-500 group-hover:rotate-180 group-hover:bg-sky-800/50">
                    <span class="text-3xl transform transition-transform duration-500 group-hover:-rotate-180">🛡️</span>
                </div>
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500 tracking-widest neon-text">
                    DEFCON-X 安全网关
                </h1>
                <p class="text-sky-500/70 text-sm mt-2 font-mono animate-pulse">=== 终端身份鉴权系统运行中 ===</p>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-5">
                
                <div>
                    <label class="block text-xs font-bold text-sky-400 uppercase tracking-wider mb-2">标识 ID (Username)</label>
                    <input type="text" v-model="loginForm.username" required placeholder="请输入授权账号" class="input-box w-full text-base font-mono" :disabled="isLoading">
                </div>

                <div>
                    <label class="block text-xs font-bold text-sky-400 uppercase tracking-wider mb-2">访问密钥 (Password)</label>
                    <input type="password" v-model="loginForm.password" required placeholder="请输入登录密码" class="input-box w-full text-base font-mono" :disabled="isLoading">
                </div>

                <div>
                    <label class="block text-xs font-bold text-sky-400 uppercase tracking-wider mb-2">身份识别码 (Identity Code)</label>
                    <input type="password" v-model="loginForm.identityCode" required placeholder="请输入授权身份码" class="input-box w-full text-base font-mono" :disabled="isLoading">
                </div>

                <div>
                    <label class="block text-xs font-bold text-sky-400 uppercase tracking-wider mb-2">动态防伪令牌 (Captcha)</label>
                    <div class="flex space-x-3">
                        <input type="text" v-model="loginForm.captcha" required placeholder="输入右侧校验码" class="input-box flex-1 text-base font-mono uppercase" :disabled="isLoading">
                        
                        <div @click="refreshCaptcha" title="点击重置令牌" class="w-28 bg-slate-900 border border-sky-800 text-amber-400 font-bold text-xl tracking-[0.2em] rounded-sm flex items-center justify-center cursor-pointer hover:bg-slate-800 hover:border-sky-400 no-select line-through decoration-slate-500 decoration-2 transition-all shadow-[0_0_10px_rgba(2,132,199,0.1)]">
                            {{ generatedCaptcha }}
                        </div>
                    </div>
                </div>

                <div v-if="errorMessage" class="bg-red-950/80 border border-red-500 text-red-400 text-sm px-4 py-3 rounded-sm flex items-center shadow-[0_0_15px_rgba(239,68,68,0.3)] animate-pulse">
                    <span class="mr-2">❌</span> {{ errorMessage }}
                </div>

                <button type="submit" :disabled="isLoading" 
                        class="w-full bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-500 hover:to-blue-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-sm shadow-[0_0_15px_rgba(2,132,199,0.5)] hover:shadow-[0_0_25px_rgba(56,189,248,0.8)] transition-all uppercase tracking-widest mt-6 relative overflow-hidden group text-lg">
                    <span class="relative z-10">{{ isLoading ? '系统通讯建立中...' : '启动系统 (INIT LOGIN)' }}</span>
                    <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1s_infinite]"></div>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="register.html" class="text-slate-400 hover:text-sky-400 text-sm transition-all border-b border-transparent hover:border-sky-400 pb-1">
                    [ 暂无系统授权？申请干员录入 ]
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        // 找回：设置你原本的后端请求地址
        axios.defaults.baseURL = 'http://localhost:8080';

        createApp({
            setup() {
                // 找回：完整的表单字段
                const loginForm = ref({ username: '', password: '', identityCode: '', captcha: '' });
                const errorMessage = ref('');
                const isLoading = ref(false);
                const generatedCaptcha = ref('');

                // 找回：前端验证码生成逻辑
                const generateRandomCode = () => {
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                    let code = '';
                    for (let i = 0; i < 4; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
                    return code;
                };

                const refreshCaptcha = () => {
                    generatedCaptcha.value = generateRandomCode();
                    loginForm.value.captcha = '';
                };

                onMounted(() => { refreshCaptcha(); });

                // 找回：完整的请求与跳转逻辑
                const handleLogin = async () => {
                    errorMessage.value = '';

                    // 1. 验证码校验
                    if (loginForm.value.captcha.toUpperCase() !== generatedCaptcha.value.toUpperCase()) {
                        errorMessage.value = '鉴权失败：防伪令牌校验不通过！';
                        refreshCaptcha();
                        return;
                    }

                    isLoading.value = true;

                    // 2. 发送请求给后端
                    try {
                        const payload = {
                            username: loginForm.value.username,
                            password: loginForm.value.password,
                            identityCode: loginForm.value.identityCode
                        };

                        const response = await axios.post('/api/v1/auth/login', payload);
                        const resData = response.data;

                        if (resData.code === 200) {
                            // 3. 角色跳转逻辑恢复
                            const userRole = resData.data.role;
                            if (userRole === 'admin') {
                                window.location.href = 'admin.html';
                            } else {
                                window.location.href = 'user.html'; 
                            }
                        } else {
                            errorMessage.value = resData.msg || '鉴权被拒，凭证无效。';
                            refreshCaptcha();
                        }
                    } catch (error) {
                        errorMessage.value = error.response ? (error.response.data.msg || '中枢服务器未响应') : '网络连接中断，请检查后端服务。';
                        refreshCaptcha();
                    } finally {
                        isLoading.value = false;
                    }
                };

                return { loginForm, errorMessage, isLoading, generatedCaptcha, refreshCaptcha, handleLogin };
            }
        }).mount('#app');
    </script>
</body>
</html>
